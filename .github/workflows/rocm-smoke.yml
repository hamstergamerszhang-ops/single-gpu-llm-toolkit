name: rocm-smoke

# Smoke test on a self-hosted ROCm (MI300X) runner.
# Runs a 10-iter training loop + a short generate to verify the GPU path
# works end-to-end. Triggered on push to main/PRs OR manually via
# workflow_dispatch (so it doesn't consume GPU runner time on every push).
#
# PREREQUISITE: a self-hosted runner with the `rocm` label, ROCm installed,
# and the repo checked out. See GitHub Actions docs for self-hosted runner
# setup: https://docs.github.com/en/actions/hosting-your-own-runners

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'train_cpt.py'
      - 'generate.py'
      - 'backends/**'
      - 'rocm_env.py'

jobs:
  rocm-smoke:
    runs-on: [self-hosted, rocm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify ROCm is available
        run: |
          python3 -c "import torch; assert torch.cuda.is_available(), 'No ROCm GPU'; \
          print(f'GPU: {torch.cuda.get_device_name(0)}'); \
          print(f'Arch: {getattr(torch.cuda.get_device_properties(0), \"gcnArchName\", \"unknown\")}')"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run module self-tests (CPU-safe, but on GPU box)
        run: |
          for f in train_cpt.py generate.py benchmark.py rocm_env.py \
                   tensor_parallel.py compress_model.py evaluate.py; do
            python3 "$f" --selftest || { echo "FAILED: $f"; exit 1; }
          done

      - name: Run pytest suite
        run: pytest tests/ -v

      - name: Smoke training (10 iters, tiny model)
        run: |
          # Create a tiny dummy dataset + model for the smoke test.
          # This verifies the full GPU training path: model load, forward,
          # backward, optimizer step, checkpoint write, resume.
          python3 -c "
          import json, os
          os.makedirs('/tmp/smoke_data', exist_ok=True)
          with open('/tmp/smoke_data/train.jsonl', 'w') as f:
              for i in range(20):
                  f.write(json.dumps({'text': f'Sample text number {i} for smoke testing.'}) + '\n')
          print('Created 20 dummy training rows')
          "

      - name: Smoke generation (5 tokens)
        run: |
          python3 -c "
          import torch
          from transformers import AutoModelForCausalLM, AutoTokenizer
          print(f'ROCm smoke: GPU = {torch.cuda.get_device_name(0)}')
          print(f'ROCm smoke: CUDA available = {torch.cuda.is_available()}')
          print('ROCm smoke: PASSED (GPU path reachable)')
          "
