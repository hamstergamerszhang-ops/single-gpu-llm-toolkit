name: self-tests

# Runs every module's --selftest + the pytest suite on push/PR.
# All self-tests are CPU-only (no GPU needed) — they exercise the real logic
# (LR schedule math, atomic checkpoint rename, optimizer compat, cache stream,
# MTP weight generation, rocm_env family-matching, chat-template SFT masking
# against a tiny real transformers model) against tiny in-memory fixtures or
# tiny real models, not against real hardware.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install numpy safetensors torch pytest transformers
      - name: Run module self-tests
        run: |
          # Only modules with a --selftest flag (transformation tools like
          # prune_vocab/expand_model need real checkpoints, so they have no
          # self-test — they're covered by the pytest suite's logic tests).
          # train_sft.py needs transformers installed above -- it builds a
          # tiny real model rather than mocking transformers out.
          for f in train_cpt.py async_checkpoint.py bnb_optimizer.py \
                   local_cache_stream.py optimizer_compat_guard.py \
                   rocm_env.py mtp_head.py train_sft.py \
                   preprocess_data.py benchmark.py generate.py; do
            echo "=== $f --selftest ==="
            python "$f" --selftest || { echo "FAILED: $f"; exit 1; }
          done
      - name: Run pytest suite
        run: pytest tests/ -v
